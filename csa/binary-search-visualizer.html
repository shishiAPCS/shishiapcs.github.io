
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Visualizer - CS Interactive</title>
    <style>
        :root {
            --primary-blue: #3498db;
            --primary-red: #e74c3c;
            --primary-gold: #f1c40f;
            --success-green: #2ecc71;
            --gray-out: #dfe6e9;
            --text-main: #2d3436;
            --bg-body: #f7f9fb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { margin-bottom: 10px; }
        p { margin-top: 0; color: #636e72; }

        /* Controls Section */
        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            max-width: 900px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: bold; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 80px; }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        .btn-step { background-color: var(--primary-blue); color: white; }
        .btn-play { background-color: var(--success-green); color: white; }
        .btn-reset { background-color: #636e72; color: white; }
        .btn-new { background-color: #a29bfe; color: white; }

        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 2px; }

        /* Status Panel */
        #status-panel {
            width: 100%;
            max-width: 800px;
            background: #2d3436;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 30px;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
        }
        .highlight-text { color: var(--primary-gold); font-weight: bold; }

        /* Array Visualization */
        .array-container {
            display: flex;
            gap: 8px;
            padding: 40px 10px;
            overflow-x: auto;
            max-width: 100%;
            justify-content: center;
        }

        .box-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-width: 50px;
        }

        .box {
            width: 50px;
            height: 50px;
            background: white;
            border: 2px solid #b2bec3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .index-label {
            margin-top: 5px;
            font-size: 0.75rem;
            color: #636e72;
        }

        /* Pointer Labels (L, R, M) */
        .pointer-label {
            position: absolute;
            top: -30px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            gap: 2px;
        }

        /* Classes for Highlighting */
        .box.left-boundary { border-color: var(--primary-blue); border-width: 3px; box-shadow: 0 0 10px rgba(52, 152, 219, 0.5); }
        .box.right-boundary { border-color: var(--primary-red); border-width: 3px; box-shadow: 0 0 10px rgba(231, 76, 60, 0.5); }
        .box.middle-check {
            background-color: var(--primary-gold);
            border-color: #d4ac0d;
            animation: pulse 0.6s infinite alternate;
        }
        .box.found { background-color: var(--success-green); color: white; border-color: #27ae60; }
        .box.out-of-range { opacity: 0.3; background-color: var(--gray-out); }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Printable optimization */
        @media print {
            .controls, button { display: none; }
            #status-panel { color: black; background: white; border: 1px solid #ccc; }
        }
    </style>
</head>
<body>

    <h1>Binary Search Visualizer</h1>
    <p>A step-by-step tool to understand how divide-and-conquer searching works.</p>

    <div class="legend">
        <div class="legend-item"><span class="dot" style="background: var(--primary-blue);"></span> Left (L)</div>
        <div class="legend-item"><span class="dot" style="background: var(--primary-red);"></span> Right (R)</div>
        <div class="legend-item"><span class="dot" style="background: var(--primary-gold);"></span> Middle (M)</div>
        <div class="legend-item"><span class="dot" style="background: var(--success-green);"></span> Target Found</div>
    </div>

    <div class="controls">
        <div class="input-group">
            <label>Target Value</label>
            <input type="number" id="targetInput" value="15">
        </div>
        <div class="input-group">
            <label>Array Size</label>
            <input type="number" id="sizeInput" value="15" min="2" max="25">
        </div>
        <button class="btn-new" onclick="createNewArray()">New Random Array</button>
        <button class="btn-reset" onclick="resetSearch()">Reset</button>
        <button class="btn-step" id="stepBtn" onclick="step()">Next Step</button>
        <button class="btn-play" id="playBtn" onclick="togglePlay()">Play</button>
    </div>

    <div id="status-panel">
        <div>Steps: <span id="step-count">0</span></div>
        <div id="status-logic">Click "Next Step" to begin the search.</div>
        <div id="status-comparison" class="highlight-text"></div>
    </div>

    <div class="array-container" id="array-display">
        </div>

    <script>
        // --- Application State ---
        let array = [2, 5, 8, 12, 16, 23, 38]; // Default example
        let target = 15;
        let left = 0;
        let right = array.length - 1;
        let middle = -1;
        let stepCount = 0;
        let isFinished = false;
        let playInterval = null;

        // --- Core Functions ---

        /**
         * Initializes the array and UI
         */
        function init(customArray = null) {
            if (customArray) {
                array = customArray;
            }
            target = parseInt(document.getElementById('targetInput').value);
            left = 0;
            right = array.length - 1;
            middle = -1;
            stepCount = 0;
            isFinished = false;
            stopAutoplay();
            
            document.getElementById('step-count').innerText = stepCount;
            document.getElementById('status-logic').innerText = "Array initialized. Ready to search.";
            document.getElementById('status-comparison').innerText = "";
            render();
        }

        /**
         * Generates a new sorted random array
         */
        function createNewArray() {
            const size = parseInt(document.getElementById('sizeInput').value) || 15;
            let newArr = [];
            let current = Math.floor(Math.random() * 10);
            for (let i = 0; i < size; i++) {
                newArr.push(current);
                current += Math.floor(Math.random() * 10) + 2; // Ensure sorted and unique-ish
            }
            init(newArr);
        }

        /**
         * Resets search pointers without changing the array
         */
        function resetSearch() {
            init(array);
        }

        /**
         * Performs one step of the Binary Search algorithm
         */
        function step() {
            if (isFinished) return;

            stepCount++;
            document.getElementById('step-count').innerText = stepCount;

            // 1. Evaluate condition
            const conditionText = `Condition: left <= right → ${left} <= ${right}`;
            
            if (left > right) {
                document.getElementById('status-logic').innerText = `${conditionText} is FALSE.`;
                document.getElementById('status-comparison').innerText = `STOP: Range empty. Target ${target} not found.`;
                isFinished = true;
                stopAutoplay();
                render();
                return;
            }

            document.getElementById('status-logic').innerText = `${conditionText} is TRUE.`;

            // 2. Calculate Middle
            middle = Math.floor((left + right) / 2);
            const valM = array[middle];

            // 3. Compare
            if (valM === target) {
                document.getElementById('status-comparison').innerText = `target ${target} == array[${middle}]. FOUND!`;
                isFinished = true;
                stopAutoplay();
            } else if (valM < target) {
                document.getElementById('status-comparison').innerText = `target ${target} > array[${middle}] (${valM}), so left = middle + 1`;
                // Prep boundaries for visual next step
                render(); // Render current middle first
                left = middle + 1;
            } else {
                document.getElementById('status-comparison').innerText = `target ${target} < array[${middle}] (${valM}), so right = middle - 1`;
                // Prep boundaries for visual next step
                render(); // Render current middle first
                right = middle - 1;
            }

            if (!isFinished) {
                // We keep the middle highlighted for this step's render
                render();
            } else {
                render(true); // Final render
            }
        }

        /**
         * Renders the array to the DOM
         */
        function render(found = false) {
            const container = document.getElementById('array-display');
            container.innerHTML = '';

            array.forEach((val, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'box-wrapper';

                const box = document.createElement('div');
                box.className = 'box';
                box.innerText = val;

                // Index Label
                const idxLabel = document.createElement('div');
                idxLabel.className = 'index-label';
                idxLabel.innerText = `idx: ${idx}`;

                // Pointer Labels Container
                const ptrContainer = document.createElement('div');
                ptrContainer.className = 'pointer-label';

                // Logical highlighting
                if (idx < left || idx > right) {
                    box.classList.add('out-of-range');
                }

                if (idx === left) {
                    box.classList.add('left-boundary');
                    ptrContainer.innerHTML += '<span style="color:var(--primary-blue)">L</span>';
                }
                if (idx === right) {
                    box.classList.add('right-boundary');
                    ptrContainer.innerHTML += '<span style="color:var(--primary-red)">R</span>';
                }
                if (idx === middle && !isFinished) {
                    box.classList.add('middle-check');
                    ptrContainer.innerHTML += '<span style="color:var(--primary-gold)">M</span>';
                }
                
                if (found && idx === middle) {
                    box.classList.add('found');
                    ptrContainer.innerHTML = '<span style="color:var(--success-green)">FOUND</span>';
                }

                wrapper.appendChild(ptrContainer);
                wrapper.appendChild(box);
                wrapper.appendChild(idxLabel);
                container.appendChild(wrapper);
            });
        }

        /**
         * Handles Auto-play functionality
         */
        function togglePlay() {
            const btn = document.getElementById('playBtn');
            if (playInterval) {
                stopAutoplay();
            } else {
                if (isFinished) resetSearch();
                btn.innerText = "Pause";
                btn.style.backgroundColor = "#e67e22";
                playInterval = setInterval(() => {
                    if (isFinished) {
                        stopAutoplay();
                    } else {
                        step();
                    }
                }, 800);
            }
        }

        function stopAutoplay() {
            clearInterval(playInterval);
            playInterval = null;
            const btn = document.getElementById('playBtn');
            btn.innerText = "Play";
            btn.style.backgroundColor = "var(--success-green)";
        }

        // Initialize with default example on load
        window.onload = () => init();

    </script>
</body>
</html>
