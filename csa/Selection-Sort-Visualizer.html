
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Sort Interactive Lab</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #2563eb; /* Blue for j */
            --secondary: #9333ea; /* Purple for k */
            --accent: #16a34a; /* Green for minIndex */
            --sorted: #e2e8f0;
            --text-main: #1e293b;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 { margin-top: 0; text-align: center; color: #0f172a; }

        /* --- Controls Section --- */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        input { padding: 8px; border: 1px solid var(--border); border-radius: 4px; }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-step { background: #0ea5e9; color: white; }
        .btn-reset { background: #64748b; color: white; }
        .btn-outline { background: white; border: 2px solid var(--border); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Visualization Area --- */
        #array-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 8px;
            margin: 40px 0;
            min-height: 120px;
            padding-bottom: 20px;
            overflow-x: auto;
        }

        .element-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.4s ease;
        }

        .box {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #94a3b8;
            border-radius: 6px;
            background: white;
            font-weight: bold;
            font-size: 1.1rem;
            position: relative;
        }

        .index-label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        .pointer-label {
            position: absolute;
            top: -30px;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* State Styles */
        .box.j-ptr { border-color: var(--primary); background: #eff6ff; border-width: 3px; }
        .box.k-ptr { border-color: var(--secondary); background: #faf5ff; border-width: 3px; }
        .box.min-ptr { border-color: var(--accent); background: #f0fdf4; border-width: 3px; }
        .box.sorted { background: var(--sorted); color: #64748b; border-color: #cbd5e1; }
        .box.sorted::after { content: '✓'; position: absolute; bottom: -2px; right: 2px; font-size: 0.7rem; }

        .label-j { color: var(--primary); }
        .label-k { color: var(--secondary); }
        .label-min { color: var(--accent); }

        .divider {
            width: 3px;
            height: 60px;
            background: #cbd5e1;
            margin: 0 10px;
            border-radius: 2px;
        }

        /* --- Status Panel --- */
        .status-panel {
            display: grid;
            grid-template-columns: 1fr 250px;
            gap: 20px;
            border-top: 2px solid #f1f5f9;
            padding-top: 20px;
        }

        .explanation {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            font-style: italic;
            min-height: 60px;
        }

        .stats {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
        }

        .legend {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 2px; }

        @media (max-width: 600px) {
            .status-panel { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Selection Sort Visualizer</h1>

    <div class="controls-grid">
        <div class="input-group">
            <label>Array Size</label>
            <input type="number" id="arrSize" value="10" min="2" max="20">
        </div>
        <div class="input-group">
            <label>Range (Min, Max)</label>
            <div style="display:flex; gap:5px">
                <input type="number" id="minVal" value="-20" style="width:50%">
                <input type="number" id="maxVal" value="99" style="width:50%">
            </div>
        </div>
        <div class="input-group">
            <label>Custom (e.g. 5, 2, 9)</label>
            <input type="text" id="customArr" placeholder="Overrides random">
        </div>
        <div class="input-group">
            <label>Speed (ms)</label>
            <input type="range" id="speed" min="200" max="1500" value="800">
        </div>
    </div>

    <div class="button-row">
        <button class="btn-primary" onclick="generateNew()">Generate New Array</button>
        <button class="btn-outline" onclick="loadDefault()">Default Example</button>
        <button class="btn-outline" onclick="loadNearlySorted()">Nearly Sorted</button>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--primary)"></div> j (Current target)</div>
        <div class="legend-item"><div class="dot" style="background: var(--secondary)"></div> k (Scanning)</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent)"></div> minIndex (Smallest found)</div>
        <div class="legend-item"><div class="dot" style="background: var(--sorted)"></div> Sorted portion</div>
    </div>

    <div id="array-container"></div>

    <div class="button-row">
        <button id="btnStep" class="btn-step" onclick="handleStep()">Step</button>
        <button id="btnPlay" class="btn-primary" onclick="togglePlay()">Play</button>
        <button class="btn-reset" onclick="resetSort()">Reset</button>
    </div>

    <div class="status-panel">
        <div class="explanation" id="statusText">
            Welcome! Press Step or Play to begin the sorting process.
        </div>
        <div class="stats">
            <div>j: <span id="valJ">-</span></div>
            <div>k: <span id="valK">-</span></div>
            <div>min: <span id="valMin">-</span></div>
            <hr>
            <div>Comparisons: <span id="statComp">0</span></div>
            <div>Swaps: <span id="statSwaps">0</span></div>
            <div>Passes: <span id="statPass">0</span></div>
        </div>
    </div>
</div>

<script>
    /**
     * STATE MACHINE DESIGN
     * The sorting logic is broken into granular steps:
     * 1. START_PASS: Set j, minIndex = j, k = j+1
     * 2. COMPARE: Compare arr[k] with arr[minIndex]
     * 3. UPDATE_MIN: If k was smaller, update minIndex
     * 4. NEXT_K: Increment k. If k < len, go back to COMPARE
     * 5. SWAP: Swap j and minIndex, increment j, go back to START_PASS
     */

    let originalArray = [];
    let currentArray = [];
    let state = {
        j: 0,
        k: 0,
        minIndex: 0,
        phase: 'READY', // READY, START_PASS, COMPARE, UPDATE_MIN, PRE_SWAP, FINISHED
        comparisons: 0,
        swaps: 0,
        passes: 0
    };

    let timer = null;
    let isPlaying = false;

    // Initial Load
    window.onload = loadDefault;

    function generateNew() {
        const size = parseInt(document.getElementById('arrSize').value) || 10;
        const min = parseInt(document.getElementById('minVal').value) || 0;
        const max = parseInt(document.getElementById('maxVal').value) || 100;
        const custom = document.getElementById('customArr').value;

        if (custom.trim() !== "") {
            originalArray = custom.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        } else {
            originalArray = Array.from({ length: size }, () => Math.floor(Math.random() * (max - min + 1)) + min);
        }
        resetSort();
    }

    function loadDefault() {
        originalArray = [3, 86, -20, 14, 40];
        document.getElementById('customArr').value = "";
        resetSort();
    }

    function loadNearlySorted() {
        originalArray = [1, 2, 3, 5, 4, 6, 7, 8];
        document.getElementById('customArr').value = "";
        resetSort();
    }

    function resetSort() {
        stopPlay();
        currentArray = [...originalArray];
        state = {
            j: 0,
            k: 0,
            minIndex: 0,
            phase: 'START_PASS',
            comparisons: 0,
            swaps: 0,
            passes: 0
        };
        updateStatus("Array initialized. Press Step to begin.");
        render();
    }

    function render() {
        const container = document.getElementById('array-container');
        container.innerHTML = '';

        currentArray.forEach((val, idx) => {
            // Add divider between sorted and unsorted
            if (idx === state.j && idx !== 0) {
                const div = document.createElement('div');
                div.className = 'divider';
                container.appendChild(div);
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'element-wrapper';
            
            const box = document.createElement('div');
            box.className = 'box';
            box.innerText = val;

            // Apply classes based on state
            if (idx < state.j) box.classList.add('sorted');
            
            let labels = [];
            if (state.phase !== 'FINISHED') {
                if (idx === state.j) {
                    box.classList.add('j-ptr');
                    labels.push('<span class="label-j">j</span>');
                }
                if (idx === state.k && (state.phase === 'COMPARE' || state.phase === 'UPDATE_MIN')) {
                    box.classList.add('k-ptr');
                    labels.push('<span class="label-k">k</span>');
                }
                if (idx === state.minIndex) {
                    box.classList.add('min-ptr');
                    labels.push('<span class="label-min">min</span>');
                }
            }

            if (labels.length > 0) {
                const lDiv = document.createElement('div');
                lDiv.className = 'pointer-label';
                lDiv.innerHTML = labels.join(' / ');
                wrapper.appendChild(lDiv);
            }

            const iDiv = document.createElement('div');
            iDiv.className = 'index-label';
            iDiv.innerText = `idx: ${idx}`;

            wrapper.appendChild(box);
            wrapper.appendChild(iDiv);
            container.appendChild(wrapper);
        });

        // Update Stats UI
        document.getElementById('valJ').innerText = state.phase === 'FINISHED' ? 'done' : state.j;
        document.getElementById('valK').innerText = (state.phase === 'COMPARE' || state.phase === 'UPDATE_MIN') ? state.k : '-';
        document.getElementById('valMin').innerText = state.phase === 'FINISHED' ? '-' : state.minIndex;
        document.getElementById('statComp').innerText = state.comparisons;
        document.getElementById('statSwaps').innerText = state.swaps;
        document.getElementById('statPass').innerText = state.passes;
        
        document.getElementById('btnStep').disabled = (state.phase === 'FINISHED');
    }

    function updateStatus(msg) {
        document.getElementById('statusText').innerHTML = msg;
    }

    function handleStep() {
        const n = currentArray.length;

        switch (state.phase) {
            case 'START_PASS':
                if (state.j >= n - 1) {
                    state.phase = 'FINISHED';
                    updateStatus("<strong>Sorting Complete!</strong> The entire array is now sorted.");
                    render();
                    stopPlay();
                    return;
                }
                state.minIndex = state.j;
                state.k = state.j + 1;
                state.passes++;
                updateStatus(`<strong>Pass ${state.passes}:</strong> Starting with index j=${state.j}. Assume min is current value (${currentArray[state.j]}).`);
                state.phase = 'COMPARE';
                break;

            case 'COMPARE':
                state.comparisons++;
                const isSmaller = currentArray[state.k] < currentArray[state.minIndex];
                updateStatus(`Comparing <code>arr[k]=${currentArray[state.k]}</code> with <code>arr[min]=${currentArray[state.minIndex]}</code>.
                             ${isSmaller ? "It is smaller!" : "It is not smaller."}`);
                state.phase = 'UPDATE_MIN';
                break;

            case 'UPDATE_MIN':
                if (currentArray[state.k] < currentArray[state.minIndex]) {
                    state.minIndex = state.k;
                    updateStatus(`Updating <strong>minIndex</strong> to ${state.k}.`);
                } else {
                    updateStatus(`minIndex remains ${state.minIndex}.`);
                }
                
                if (state.k < n - 1) {
                    state.k++;
                    state.phase = 'COMPARE';
                } else {
                    state.phase = 'PRE_SWAP';
                }
                break;

            case 'PRE_SWAP':
                if (state.minIndex !== state.j) {
                    updateStatus(`Inner loop finished. Smallest value found was <strong>${currentArray[state.minIndex]}</strong>. Swapping with <strong>${currentArray[state.j]}</strong>.`);
                    // Logic swap
                    let temp = currentArray[state.j];
                    currentArray[state.j] = currentArray[state.minIndex];
                    currentArray[state.minIndex] = temp;
                    state.swaps++;
                } else {
                    updateStatus(`Inner loop finished. Smallest value is already at index <strong>j=${state.j}</strong>. Swap skipped.`);
                }
                state.j++;
                state.phase = 'START_PASS';
                break;
        }
        render();
    }

    function togglePlay() {
        if (isPlaying) {
            stopPlay();
        } else {
            startPlay();
        }
    }

    function startPlay() {
        isPlaying = true;
        document.getElementById('btnPlay').innerText = "Pause";
        document.getElementById('btnPlay').classList.replace('btn-primary', 'btn-reset');
        
        const run = () => {
            if (state.phase === 'FINISHED') {
                stopPlay();
                return;
            }
            handleStep();
            const speed = parseInt(document.getElementById('speed').value);
            timer = setTimeout(run, speed);
        };
        run();
    }

    function stopPlay() {
        isPlaying = false;
        clearTimeout(timer);
        document.getElementById('btnPlay').innerText = "Play";
        document.getElementById('btnPlay').classList.replace('btn-reset', 'btn-primary');
    }
</script>

</body>
</html>
