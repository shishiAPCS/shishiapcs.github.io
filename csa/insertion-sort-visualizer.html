<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insertion Sort Interactive Lab</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #2563eb; /* Blue for j */
            --secondary: #9333ea; /* Purple for possibleIndex */
            --accent: #f59e0b; /* Orange for shifting */
            --sorted-bg: #f0fdf4;
            --sorted-border: #16a34a;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --hole-bg: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 { margin-top: 0; text-align: center; color: #0f172a; }

        /* --- Controls Section --- */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        input { padding: 8px; border: 1px solid var(--border); border-radius: 4px; }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-step { background: #0ea5e9; color: white; }
        .btn-reset { background: #64748b; color: white; }
        .btn-outline { background: white; border: 2px solid var(--border); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Visualization Area --- */
        .viz-outer {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 60px 0 40px 0;
            position: relative;
        }

        #temp-container {
            height: 60px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .temp-card {
            width: 50px;
            height: 50px;
            border: 3px dashed var(--primary);
            background: #eff6ff;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            position: relative;
            transition: all 0.3s ease;
        }

        .temp-label {
            position: absolute;
            top: -25px;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
        }

        #array-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            padding: 20px;
            border-radius: 12px;
            position: relative;
        }

        .element-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 60px;
        }

        .box {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #94a3b8;
            border-radius: 6px;
            background: white;
            font-weight: bold;
            font-size: 1.1rem;
            position: relative;
            transition: transform 0.3s, background-color 0.3s, border-color 0.3s;
        }

        .index-label { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }

        .pointer-label {
            position: absolute;
            bottom: -35px;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Logic Coloring */
        .box.sorted { background: var(--sorted-bg); border-color: var(--sorted-border); }
        .box.sorted::after { content: '✓'; position: absolute; top: 2px; right: 2px; font-size: 0.6rem; color: var(--sorted-border); }
        
        .box.j-ptr { border-color: var(--primary); border-width: 3px; }
        .box.p-ptr { border-color: var(--secondary); border-width: 3px; }
        .box.shifting { background: var(--accent); color: white; transform: translateX(35px); border-color: #b45309; z-index: 10; }
        .box.hole { border: 2px dashed var(--border); background: var(--hole-bg); color: transparent; }

        .label-j { color: var(--primary); }
        .label-p { color: var(--secondary); }

        .region-label {
            position: absolute;
            top: -30px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #64748b;
            z-index: 5;
            transition: left 0.3s ease;
        }

        /* --- Status Panel --- */
        .status-panel {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 20px;
            border-top: 2px solid #f1f5f9;
            padding-top: 20px;
        }

        .explanation {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            min-height: 80px;
            line-height: 1.5;
        }

        .code-display {
            font-family: 'Courier New', Courier, monospace;
            background: #1e293b;
            color: #e2e8f0;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .stats {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            border: 1px solid var(--border);
        }

        .legend {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #0002; }

        @media (max-width: 768px) {
            .status-panel { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Insertion Sort Visualizer</h1>

    <div class="controls-grid">
        <div class="input-group">
            <label>Array Size</label>
            <input type="number" id="arrSize" value="8" min="2" max="15">
        </div>
        <div class="input-group">
            <label>Range (Min, Max)</label>
            <div style="display:flex; gap:5px">
                <input type="number" id="minVal" value="-20" style="width:50%">
                <input type="number" id="maxVal" value="99" style="width:50%">
            </div>
        </div>
        <div class="input-group">
            <label>Custom Array</label>
            <input type="text" id="customArr" placeholder="e.g. 10, 5, 2">
        </div>
        <div class="input-group">
            <label>Speed (ms)</label>
            <input type="range" id="speed" min="200" max="1500" value="800">
        </div>
    </div>

    <div class="button-row">
        <button class="btn-primary" onclick="generateNew()">Generate New Array</button>
        <button class="btn-outline" onclick="loadDefault()">Default Example</button>
        <button class="btn-outline" onclick="loadNearlySorted()">Nearly Sorted</button>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--primary)"></div> j (Outer Loop)</div>
        <div class="legend-item"><div class="dot" style="background: var(--secondary)"></div> p (Possible Index)</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent)"></div> Shifting Right</div>
        <div class="legend-item"><div class="dot" style="background: var(--hole-bg); border: 1px dashed #94a3b8"></div> The "Hole"</div>
        <div class="legend-item"><div class="dot" style="background: var(--sorted-bg); border: 1px solid var(--sorted-border)"></div> Sorted Prefix</div>
    </div>

    <div class="viz-outer">
        <div id="temp-container">
            </div>
        <div id="array-container">
            </div>
    </div>

    <div class="button-row">
        <button id="btnStep" class="btn-step" onclick="handleStep()">Step</button>
        <button id="btnPlay" class="btn-primary" onclick="togglePlay()">Play</button>
        <button class="btn-reset" onclick="resetSort()">Reset</button>
    </div>

    <div class="status-panel">
        <div class="explanation">
            <div id="statusText">Press Step or Play to begin.</div>
            <div class="code-display" id="codeDisplay">
                while (p > 0 && temp < elements[p-1]) { ... }
            </div>
        </div>
        <div class="stats">
            <div>j: <span id="valJ">-</span></div>
            <div>p: <span id="valP">-</span></div>
            <div>temp: <span id="valTemp">-</span></div>
            <hr>
            <div>Comparisons: <span id="statComp">0</span></div>
            <div>Shifts: <span id="statShifts">0</span></div>
            <div>Insertions: <span id="statInserts">0</span></div>
            <div>Passes: <span id="statPass">0</span></div>
        </div>
    </div>
</div>

<script>
    /**
     * STATE MACHINE for Insertion Sort
     * 1. START_PASS: Set temp = arr[j], p = j. Show temp floating.
     * 2. EVAL_WHILE: Check if p > 0 and temp < arr[p-1].
     * 3. SHIFT: arr[p] = arr[p-1], p--.
     * 4. INSERT: arr[p] = temp.
     * 5. NEXT_J: j++.
     */

    let originalArray = [];
    let currentArray = [];
    let state = {
        j: 1,
        p: 1,
        temp: null,
        phase: 'READY',
        comparisons: 0,
        shifts: 0,
        inserts: 0,
        passes: 0,
        isShifting: false
    };

    let timer = null;
    let isPlaying = false;

    window.onload = loadDefault;

    function generateNew() {
        const size = parseInt(document.getElementById('arrSize').value) || 10;
        const min = parseInt(document.getElementById('minVal').value) || -20;
        const max = parseInt(document.getElementById('maxVal').value) || 99;
        const custom = document.getElementById('customArr').value;

        if (custom.trim() !== "") {
            originalArray = custom.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        } else {
            originalArray = Array.from({ length: size }, () => Math.floor(Math.random() * (max - min + 1)) + min);
        }
        resetSort();
    }

    function loadDefault() {
        originalArray = [3, 86, -20, 14, 40];
        resetSort();
    }

    function loadNearlySorted() {
        originalArray = [1, 2, 3, 5, 4, 6, 7, 8];
        resetSort();
    }

    function resetSort() {
        stopPlay();
        currentArray = [...originalArray];
        state = {
            j: 1,
            p: 1,
            temp: null,
            phase: 'START_PASS',
            comparisons: 0,
            shifts: 0,
            inserts: 0,
            passes: 0,
            isShifting: false
        };
        updateStatus("Array reset. Ready to start outer loop at index 1.");
        render();
    }

    function render() {
        const container = document.getElementById('array-container');
        const tempContainer = document.getElementById('temp-container');
        container.innerHTML = '';
        tempContainer.innerHTML = '';

        // Render Temp Card
        if (state.temp !== null && state.phase !== 'FINISHED') {
            const tempCard = document.createElement('div');
            tempCard.className = 'temp-card';
            tempCard.innerHTML = `<span class="temp-label">temp</span>${state.temp}`;
            tempContainer.appendChild(tempCard);
        }

        currentArray.forEach((val, idx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'element-wrapper';
            
            const box = document.createElement('div');
            box.className = 'box';
            box.innerText = val;

            // Highlight Sorted Region (everything before j is sorted-prefix)
            if (idx < state.j) {
                box.classList.add('sorted');
            }

            // Region Labels
            if (idx === 0) {
                const reg = document.createElement('div');
                reg.className = 'region-label';
                reg.style.color = 'var(--sorted-border)';
                reg.innerText = 'Sorted';
                wrapper.appendChild(reg);
            }
            if (idx === state.j) {
                const reg = document.createElement('div');
                reg.className = 'region-label';
                reg.style.color = '#64748b';
                reg.innerText = 'Unsorted';
                wrapper.appendChild(reg);
            }

            // Highlighting based on logic
            if (idx === state.j && state.phase !== 'FINISHED') {
                box.classList.add('j-ptr');
            }

            if (idx === state.p && (state.phase === 'EVAL_WHILE' || state.phase === 'SHIFT' || state.phase === 'INSERT')) {
                box.classList.add('p-ptr');
                box.classList.add('hole');
            }

            // The element being evaluated for shift (the one left of p)
            if (state.phase === 'SHIFT' && idx === state.p) {
               // Visual shift is handled by CSS class 'shifting' on the source index
            }

            // Pointer Labels (Bottom)
            let labels = [];
            if (state.phase !== 'FINISHED') {
                if (idx === state.j) labels.push('<span class="label-j">j</span>');
                if (idx === state.p && state.phase !== 'START_PASS') labels.push('<span class="label-p">p</span>');
            }

            if (labels.length > 0) {
                const lDiv = document.createElement('div');
                lDiv.className = 'pointer-label';
                lDiv.innerHTML = labels.join(' / ');
                wrapper.appendChild(lDiv);
            }

            const iDiv = document.createElement('div');
            iDiv.className = 'index-label';
            iDiv.innerText = `idx: ${idx}`;

            wrapper.appendChild(box);
            wrapper.appendChild(iDiv);
            container.appendChild(wrapper);

            // Special handling for the shifting animation
            // In 'SHIFT' phase, we just "did" the shift, but we want to show
            // the element at index p-1 visually moving into index p.
            // For simplicity in this vanilla implementation, we'll highlight the source.
        });

        // Update Stats UI
        document.getElementById('valJ').innerText = state.phase === 'FINISHED' ? 'done' : state.j;
        document.getElementById('valP').innerText = state.temp === null ? '-' : state.p;
        document.getElementById('valTemp').innerText = state.temp === null ? '-' : state.temp;
        document.getElementById('statComp').innerText = state.comparisons;
        document.getElementById('statShifts').innerText = state.shifts;
        document.getElementById('statInserts').innerText = state.inserts;
        document.getElementById('statPass').innerText = state.passes;
        
        document.getElementById('btnStep').disabled = (state.phase === 'FINISHED');
    }

    function updateStatus(msg) {
        document.getElementById('statusText').innerHTML = msg;
    }

    function handleStep() {
        const n = currentArray.length;

        switch (state.phase) {
            case 'START_PASS':
                if (state.j >= n) {
                    state.phase = 'FINISHED';
                    updateStatus("<strong>Finished!</strong> The array is fully sorted.");
                    render();
                    stopPlay();
                    return;
                }
                state.temp = currentArray[state.j];
                state.p = state.j;
                state.passes++;
                updateStatus(`<strong>Outer Loop (j=${state.j}):</strong> Pick up <code>${state.temp}</code> into <b>temp</b>. Set <b>possibleIndex (p)</b> to ${state.j}.`);
                document.getElementById('codeDisplay').innerHTML = `temp = elements[${state.j}]; // ${state.temp}<br>p = ${state.j};`;
                state.phase = 'EVAL_WHILE';
                break;

            case 'EVAL_WHILE':
                const canCompare = state.p > 0;
                let conditionMet = false;
                
                if (canCompare) {
                    state.comparisons++;
                    const leftVal = currentArray[state.p - 1];
                    conditionMet = state.temp < leftVal;
                    
                    document.getElementById('codeDisplay').innerHTML = `while (p > 0 && temp < elements[p-1])<br>while (${state.p} > 0 && ${state.temp} < ${leftVal}) // ${conditionMet ? 'TRUE' : 'FALSE'}`;
                    
                    if (conditionMet) {
                        updateStatus(`Condition <b>TRUE</b>: <code>temp (${state.temp})</code> is less than <code>${leftVal}</code>. Prepare to shift.`);
                        state.phase = 'SHIFT';
                    } else {
                        updateStatus(`Condition <b>FALSE</b>: <code>temp (${state.temp})</code> is NOT less than <code>${leftVal}</code>. End while loop.`);
                        state.phase = 'INSERT';
                    }
                } else {
                    document.getElementById('codeDisplay').innerHTML = `while (p > 0 && ...)<br>while (0 > 0) // FALSE`;
                    updateStatus("Condition <b>FALSE</b>: <code>p</code> is 0 (reached the start). End while loop.");
                    state.phase = 'INSERT';
                }
                break;

            case 'SHIFT':
                const valToShift = currentArray[state.p - 1];
                updateStatus(`Shifting <code>${valToShift}</code> from index ${state.p-1} to ${state.p}.`);
                currentArray[state.p] = valToShift;
                state.p--;
                state.shifts++;
                document.getElementById('codeDisplay').innerHTML = `elements[p] = elements[p-1];<br>p--; // p is now ${state.p}`;
                state.phase = 'EVAL_WHILE';
                break;

            case 'INSERT':
                updateStatus(`Inserting <b>temp</b> (<code>${state.temp}</code>) into the hole at index <b>${state.p}</b>.`);
                currentArray[state.p] = state.temp;
                state.inserts++;
                document.getElementById('codeDisplay').innerHTML = `elements[p] = temp; // elements[${state.p}] = ${state.temp}`;
                state.phase = 'NEXT_J';
                break;

            case 'NEXT_J':
                state.j++;
                state.temp = null;
                updateStatus(`End of pass. Increment <b>j</b> to ${state.j}.`);
                state.phase = 'START_PASS';
                break;
        }
        render();
    }

    function togglePlay() {
        if (isPlaying) stopPlay();
        else startPlay();
    }

    function startPlay() {
        isPlaying = true;
        document.getElementById('btnPlay').innerText = "Pause";
        document.getElementById('btnPlay').classList.replace('btn-primary', 'btn-reset');
        
        const run = () => {
            if (state.phase === 'FINISHED') {
                stopPlay();
                return;
            }
            handleStep();
            const speed = parseInt(document.getElementById('speed').value);
            timer = setTimeout(run, speed);
        };
        run();
    }

    function stopPlay() {
        isPlaying = false;
        clearTimeout(timer);
        document.getElementById('btnPlay').innerText = "Play";
        document.getElementById('btnPlay').classList.replace('btn-reset', 'btn-primary');
    }
</script>

</body>
</html>
